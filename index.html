<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

    <!-- Replace with your own title and description. -->
    <title>玉龙视觉效果工作室</title>
    <meta name="description" content="玉龙视觉效果工作室的优秀 Docsify 文档站点，用于在网络上发布内容。">

    <!-- Default Theme (see https://docsify.js.org/#/themes) -->
    <link rel="icon" href="./favicon.ico">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"> -->

    <!-- Compressed -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sushantrahate/docsify-darkly-theme/css/darkly.min.css">
    <!-- Mermaid -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.css">
    <style>
        /* Mermaid 黑暗主题适配 */
        .mermaid {
            background: #2d2d2d;
            border-radius: 6px;
            padding: 16px;
            margin: 8px 0;
            text-align: center;
        }
        .mermaid svg {
            max-width: 100%;
            height: auto;
        }
        /* 分页插件样式微调 */
        .docsify-pagination-container {
            border-top: 1px solid #444;
        }
    </style>

</head>

<body>
    <div id="app"></div>

    <script>
        var num = 0;

        // Docsify Configuration (see https://docsify.js.org/#/configuration)
        window.$docsify = {
            name: 'ERON VISUAL STUDIO',
            repo: 'https://github.com/naveron/naveron.github.io',

            coverpage: true,
            basePath: 'docs/',
            homepage: 'README.md',
            loadSidebar: true,
            loadNavbar: true,
            auto2top: true,
            maxLevel: 3,
            subMaxLevel: 2,
            notFoundPage: '_404.md',
            formatUpdated: '{YYYY}/{MM}/{DD} {HH}:{mm}',

            // Search Plugin Configuration
            search: {
                paths: 'auto',
                placeholder: '输入搜索内容',
                noData: '未找到匹配项',
                depth: 2,
            },

            plugins: [
                function (hook, vm) {
                    hook.beforeEach(function (content) {
                        return content.replace(/```mermaid([\s\S]*?)```/g, function (_, code) {
                            return '<div class="mermaid">' + code.trim() + '</div>';
                        });
                    });
                    hook.doneEach(function () {
                        if (window.mermaid) {
                            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
                        }
                        if (window.MathJax && MathJax.typesetPromise) {
                            MathJax.typesetPromise().catch(function (err) {
                                console.error(err);
                            });
                        }
                    });
                }
            ]
        };
    </script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Required -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- Recommended -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        if (window.mermaid) {
            mermaid.initialize({ startOnLoad: false });
        }
    </script>
</body>

</html>
